<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Taj. Mc Photos – Portfolio</title>

    <style>
        .nav-section {
            height: 100px;
            background-color: #999;
            margin: 20px;

            display: flex;          /* enables flexbox */
            align-items: center;    /* vertical centering */
            padding: 0 20px;        /* left/right padding */
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <header class="nav-section">
        <nav>
            <h1>Taj. Mc Photos</h1>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero-section" aria-labelledby="hero-heading">
        <div>
            <h2 id="hero-heading">Capturing Space Through the Lens</h2>
            <figure>
                <img src="assets/images/hero-image.jpg" alt="Hero photography banner">
            </figure>
            <p>Fashion. Campaigns. Portraits. Sports.</p>
        </div>
    </section>

    <!-- Image Section: 3‑card staggered mosaic -->
    <main>
        <section class="portfolio-section" aria-labelledby="portfolio-heading">
            <h2 id="portfolio-heading">Featured Work</h2>

            <div class="mosaic-grid">
                <article class="mosaic-card">
                    <figure>
                        <img src="assets/images/image1.jpg" alt="Portfolio image 1">
                        <figcaption>Project Title One</figcaption>
                    </figure>
                </article>

                <article class="mosaic-card">
                    <figure>
                        <img src="assets/images/image2.jpg" alt="Portfolio image 2">
                        <figcaption>Project Title Two</figcaption>
                    </figure>
                </article>

                <article class="mosaic-card">
                    <figure>
                        <img src="assets/images/image3.jpg" alt="Portfolio image 3">
                        <figcaption>Project Title Three</figcaption>
                    </figure>
                </article>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer-section">
        <p>Socials – tajmccafferty.photo</p>
        <p>Contact – 0401 801 850</p>
        <p>Email – taj.mccafferty@gmail.com</p>
    </footer>

</body>
</html>
