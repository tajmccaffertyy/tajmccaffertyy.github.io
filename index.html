    <!-- Hero Section -->

        <figure>

</figure>

        <p class="hero-subtitle">

    </div>
</section>

    <!-- Image Section -->
    <main>
        <section class="portfolio-section" aria-labelledby="portfolio-heading">
            <h2 id="portfolio-heading">Featured Work</h2>

<script>
const images = [
    "BENJI_10-copy.jpg",
    "BENJI_11-copy.jpg",
    "BENJI_15-copy.jpg",
    "BENJI_5-copy.jpg",
    "BENJI_6-copy.jpg",
    "BENJI_8-copy.jpg",
    "BENJI_9-copy.jpg",
    "BW1.jpg",
    "BW2.jpg",
    "BW3.jpg",
    "Black-Hoodie-F-3.jpg",
    "DONNY_10-copy.jpg",
    "REMMIE21756.jpg",
    "REMMIE21779.jpg",
    "REMMIE21866.jpg",
    "REMMIE21986.jpg",
    "REMMIE22104.jpg",
    "REMMIE22152.jpg",
    "TONY_2.jpg",
    "TONY_3.jpg",
    "TONY_5.jpg",
    "TONY_6.jpg",
    "TONY_7.jpg"
];

for (let i = images.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [images[i], images[j]] = [images[j], images[i]];
}

const gallery = document.getElementById('gallery');

images.forEach(filename => {
    const item = document.createElement('div');
    item.className = 'masonry-item';

    const img = document.createElement('img');
    img.src = `Images/${filename}`;
    img.alt = filename;

    item.appendChild(img);
    gallery.appendChild(item);
});
</script>

</body>
</html>
